<!DOCTYPE html>
<html>
<head>
    <title>Krick Chat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 30px auto;
            background: #EFEAE2;
        }
        h2 { text-align: center; color: #333; margin-bottom: 10px; }
        #setup {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        #setup input {
            padding: 8px;
            margin: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
            width: 200px;
        }
        #setup button {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            background: #25D366;
            color: white;
            margin-top: 5px;
        }
        #contactsBox { margin-top: 15px; text-align: left; }
        #contactsBox h4 { margin-bottom: 6px; color: #555; }
        .contactItem {
            padding: 8px 10px;
            background: #f7f7f7;
            border-radius: 8px;
            margin-bottom: 6px;
            cursor: pointer;
        }
        .contactItem:hover { background: #e9f7ef; }
        #orDivider { margin: 15px 0 5px; color: #999; font-size: 13px; }
        #chatArea { display: none; position: relative; }
        #topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 8px 12px;
            border-radius: 10px 10px 0 0;
            border-bottom: 1px solid #ddd;
        }
        #userList { font-size: 13px; color: #555; }
        #backBtn { cursor: pointer; margin-right: 8px; }
        #messages {
            height: 350px;
            overflow-y: auto;
            border: 1px solid #ccc;
            background: white;
            padding: 10px;
        }
        .msgRow { display: flex; align-items: flex-end; margin: 6px 0; }
        .msgRow.me { justify-content: flex-end; }
        .msg { padding: 8px 12px; border-radius: 14px; max-width: 70%; word-wrap: break-word; }
        .me .msg { background: #DCF8C6; text-align: right; }
        .them .msg { background: #f1f0f0; }
        .system { background: none; color: #888; font-size: 12px; text-align: center; max-width: 100%; margin: 4px auto; }
        .time { font-size: 10px; color: #999; margin-top: 2px; }
        .edited { font-size: 10px; color: #999; font-style: italic; }
        .status { font-size: 11px; margin-left: 4px; }
        .status.seen { color: #34B7F1; }
        .status.sent { color: #999; }
        .actions { display: none; gap: 4px; margin: 0 6px; }
        .msgRow:hover .actions { display: flex; }
        .actions span { cursor: pointer; font-size: 13px; }
        .chatImg { max-width: 220px; border-radius: 10px; display: block; margin-top: 4px; }
        #typing { font-size: 12px; color: #888; height: 18px; padding-left: 5px; }
        #form { display: flex; gap: 8px; margin-top: 8px; position: relative; align-items: center; }
        #input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; }
        #emojiBtn, #imageBtn {
            padding: 8px 12px;
            border-radius: 20px;
            background: white;
            border: 1px solid #ccc;
            font-size: 18px;
            cursor: pointer;
        }
        #send { padding: 10px 18px; border-radius: 20px; background: #25D366; color: white; border: none; }
        #emojiPanel {
            display: none;
            position: absolute;
            bottom: 50px;
            left: 0;
            background: white;
            border: 1px solid #ccc;
            border-radius: 10px;
            padding: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            flex-wrap: wrap;
            width: 220px;
            z-index: 10;
        }
        #emojiPanel span { font-size: 20px; cursor: pointer; padding: 4px; display: inline-block; }
        #imagePreviewWrap {
            display: none;
            padding: 6px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 10px;
            margin-bottom: 6px;
            position: relative;
            width: fit-content;
        }
        #imagePreviewWrap img { max-height: 80px; border-radius: 6px; display: block; }
        #cancelPreview {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #e74c3c;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            text-align: center;
            font-size: 12px;
            line-height: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;">
    <svg width="40" height="40" viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
        <circle cx="45" cy="45" r="42" fill="#25D366"/>
        <path d="M45 18c-14.9 0-27 10.7-27 24 0 6.4 2.9 12.2 7.7 16.6L22 68l11.4-5.1c3.5 1.3 7.4 2.1 11.6 2.1 14.9 0 27-10.7 27-24S59.9 18 45 18z" fill="white"/>
        <text x="45" y="53" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#25D366" text-anchor="middle">K</text>
    </svg>
    <h2 style="margin:0;">Krick Chat</h2>
</div>

    <div id="setup">
        <input id="nameInput" placeholder="Your name" />
<input id="phoneInput" placeholder="Phone number" type="tel" maxlength="10" />
<button id="registerBtn">Continue</button>

        <div id="contactsBox" style="display:none;">
            <h4>Online now — tap to chat privately:</h4>
            <div id="contactsList"></div>

            <div id="orDivider">— or join/create a group room —</div>
            <input id="roomInput" placeholder="Room name (e.g. friends)" />
            <button id="joinRoomBtn">Join Room</button>
        </div>
    </div>

    <div id="chatArea">
        <div id="topbar">
            <span><span id="backBtn">←</span><strong id="roomLabel"></strong></span>
            <span id="userList"></span>
        </div>
        <div id="messages"></div>
        <div id="typing"></div>
        <div id="imagePreviewWrap">
            <span id="cancelPreview">✕</span>
            <img id="previewImg" />
        </div>
        <div id="form">
            <button id="emojiBtn" type="button">😀</button>
            <div id="emojiPanel"></div>
            <button id="imageBtn" type="button">📷</button>
            <input id="fileInput" type="file" accept="image/*" style="display:none;" />
            <input id="input" placeholder="Type a message" autocomplete="off" />
            <button id="send">Send</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        var socket = io();
        var username = "";
        var room = "";
        var typingTimeout;
        var pendingImageFile = null;

        var messages = document.getElementById('messages');
        var input = document.getElementById('input');
        var sendBtn = document.getElementById('send');
        var typingDiv = document.getElementById('typing');
        var userListSpan = document.getElementById('userList');
        var emojiBtn = document.getElementById('emojiBtn');
        var emojiPanel = document.getElementById('emojiPanel');
        var contactsList = document.getElementById('contactsList');
        var imageBtn = document.getElementById('imageBtn');
        var fileInput = document.getElementById('fileInput');
        var previewWrap = document.getElementById('imagePreviewWrap');
        var previewImg = document.getElementById('previewImg');
        var cancelPreview = document.getElementById('cancelPreview');

        var emojiList = ['😀','😂','😍','😎','😢','😡','👍','👎','🙏','🎉','❤️','🔥','😴','🤔','👋','✅'];
        emojiList.forEach(function(e) {
            var span = document.createElement('span');
            span.textContent = e;
            span.addEventListener('click', function() {
                input.value += e;
                input.focus();
            });
            emojiPanel.appendChild(span);
        });

        emojiBtn.addEventListener('click', function() {
            emojiPanel.style.display = (emojiPanel.style.display === 'flex') ? 'none' : 'flex';
        });

        document.addEventListener('click', function(e) {
            if (!emojiPanel.contains(e.target) && e.target !== emojiBtn) {
                emojiPanel.style.display = 'none';
            }
        });

        imageBtn.addEventListener('click', function() {
            fileInput.click();
        });

        fileInput.addEventListener('change', function() {
            var file = fileInput.files[0];
            if (!file) return;
            pendingImageFile = file;
            previewImg.src = URL.createObjectURL(file);
            previewWrap.style.display = 'block';
        });

        cancelPreview.addEventListener('click', function() {
            pendingImageFile = null;
            fileInput.value = '';
            previewWrap.style.display = 'none';
        });

        var myPhone = "";
document.getElementById('registerBtn').addEventListener('click', function() {
    username = document.getElementById('nameInput').value.trim();
    myPhone = document.getElementById('phoneInput').value.trim();
    if (!username) { alert('Please enter your name'); return; }
    if (!/^\d{10}$/.test(myPhone)) { alert('Please enter a valid 10-digit phone number'); return; }
    socket.emit('register', { username: username, phone: myPhone });
    document.getElementById('contactsBox').style.display = 'block';
});

        socket.on('online_users', function(users) {
    contactsList.innerHTML = '';
    users.filter(function(u) { return u.phone !== myPhone; }).forEach(function(u) {
        var div = document.createElement('div');
        div.className = 'contactItem';
        div.textContent = u.name + ' (' + u.phone + ')';
        div.addEventListener('click', function() {
            var pair = [myPhone, u.phone].sort();
            enterRoom(pair[0] + '_' + pair[1]);
        });
        contactsList.appendChild(div);
    });
    if (contactsList.innerHTML === '') {
        contactsList.innerHTML = '<div style="color:#999;font-size:13px;">No one else online yet</div>';
    }
});

        document.getElementById('joinRoomBtn').addEventListener('click', function() {
            var r = document.getElementById('roomInput').value.trim() || 'general';
            enterRoom(r);
        });

        document.getElementById('backBtn').addEventListener('click', function() {
            document.getElementById('chatArea').style.display = 'none';
            document.getElementById('setup').style.display = 'block';
            messages.innerHTML = '';
        });

        function enterRoom(r) {
            room = r;
            document.getElementById('setup').style.display = 'none';
            document.getElementById('chatArea').style.display = 'block';
            document.getElementById('roomLabel').textContent = 'Room: ' + room;
            socket.emit('join', { username: username, room: room });
        }

        function makeId() {
            return Date.now() + '_' + Math.random().toString(36).slice(2, 8);
        }

        function bubbleContentHtml(data) {
            if (data.imageUrl) {
                return '<img class="chatImg" src="' + data.imageUrl + '" />';
            }
            return '<span class="bubbleText">' + data.text + '</span>';
        }

        function addMessage(data, isMe) {
            if (data.user === 'System') {
                var sys = document.createElement('div');
                sys.className = 'msg system';
                sys.textContent = data.text;
                messages.appendChild(sys);
                messages.scrollTop = messages.scrollHeight;
                return;
            }

            var row = document.createElement('div');
            row.className = 'msgRow ' + (isMe ? 'me' : 'them');
            row.id = 'row_' + data.id;

            var bubble = document.createElement('div');
            bubble.className = 'msg';
            var statusHtml = isMe ? '<span class="status sent" id="status_' + data.id + '">✓</span>' : '';
            bubble.innerHTML = (isMe ? '' : '<b>' + data.user + '</b><br>') +
                bubbleContentHtml(data) +
                '<div class="time">' + data.time + (data.editedFlag ? ' <span class="edited">(edited)</span>' : '') + statusHtml + '</div>';

            if (isMe && !data.imageUrl) {
                var actions = document.createElement('div');
                actions.className = 'actions';

                var editIcon = document.createElement('span');
                editIcon.textContent = '✏️';
                editIcon.addEventListener('click', function() { editMessage(data.id); });

                var delIcon = document.createElement('span');
                delIcon.textContent = '🗑️';
                delIcon.addEventListener('click', function() { deleteMessage(data.id); });

                actions.appendChild(editIcon);
                actions.appendChild(delIcon);
                row.appendChild(actions);
            }

            row.appendChild(bubble);
            messages.appendChild(row);
            messages.scrollTop = messages.scrollHeight;

            if (!isMe) {
                socket.emit('message_seen', { id: data.id, room: room });
            }
        }

        function editMessage(id) {
            var row = document.getElementById('row_' + id);
            var textSpan = row.querySelector('.bubbleText');
            if (!textSpan) return;
            var newText = prompt('Edit message:', textSpan.textContent);
            if (newText === null || newText.trim() === '') return;
            textSpan.textContent = newText.trim();
            var timeDiv = row.querySelector('.time');
            if (!timeDiv.querySelector('.edited')) {
                var span = document.createElement('span');
                span.className = 'edited';
                span.textContent = ' (edited)';
                var statusEl = timeDiv.querySelector('.status');
                if (statusEl) { timeDiv.insertBefore(span, statusEl); } else { timeDiv.appendChild(span); }
            }
            socket.emit('edit_message', { id: id, text: newText.trim(), room: room });
        }

        function deleteMessage(id) {
            var row = document.getElementById('row_' + id);
            if (row) row.remove();
            socket.emit('delete_message', { id: id, room: room });
        }

        function currentTime() {
            var d = new Date();
            var h = d.getHours();
            var m = d.getMinutes();
            var ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            if (m < 10) m = '0' + m;
            return h + ':' + m + ' ' + ampm;
        }

        function sendMessage() {
            if (pendingImageFile) {
                sendImage();
                return;
            }
            var text = input.value.trim();
            if (!text) return;
            var data = { id: makeId(), text: text, user: username, room: room, time: currentTime() };
            socket.emit('send_message', data);
            addMessage(data, true);
            input.value = '';
            emojiPanel.style.display = 'none';
        }

        function sendImage() {
            var formData = new FormData();
            formData.append('image', pendingImageFile);
            fetch('/upload', { method: 'POST', body: formData })
                .then(function(res) { return res.json(); })
                .then(function(result) {
                    if (result.url) {
                        var data = { id: makeId(), imageUrl: result.url, user: username, room: room, time: currentTime() };
                        socket.emit('send_message', data);
                        addMessage(data, true);
                    }
                    pendingImageFile = null;
                    fileInput.value = '';
                    previewWrap.style.display = 'none';
                })
                .catch(function() {
                    alert('Image upload failed. Try again.');
                });
        }

        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            } else {
                socket.emit('typing', { user: username, room: room });
            }
        });

        socket.on('receive_message', function(data) {
            if (data.user !== username) {
                addMessage(data, false);
            }
        });

        socket.on('message_edited', function(data) {
            var row = document.getElementById('row_' + data.id);
            if (!row) return;
            var textSpan = row.querySelector('.bubbleText');
            if (!textSpan) return;
            textSpan.textContent = data.text;
            var timeDiv = row.querySelector('.time');
            if (!timeDiv.querySelector('.edited')) {
                var span = document.createElement('span');
                span.className = 'edited';
                span.textContent = ' (edited)';
                var statusEl = timeDiv.querySelector('.status');
                if (statusEl) { timeDiv.insertBefore(span, statusEl); } else { timeDiv.appendChild(span); }
            }
        });

        socket.on('message_deleted', function(data) {
            var row = document.getElementById('row_' + data.id);
            if (row) row.remove();
        });

        socket.on('message_seen_update', function(data) {
            var statusEl = document.getElementById('status_' + data.id);
            if (statusEl) {
                statusEl.textContent = '✓✓';
                statusEl.className = 'status seen';
            }
        });

        socket.on('user_list', function(users) {
            userListSpan.textContent = users.join(', ');
        });

        socket.on('user_typing', function(data) {
            typingDiv.textContent = data.user + ' is typing...';
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(function() {
                typingDiv.textContent = '';
            }, 1500);
        });
    </script>
</body>
</html>
